<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Weiterleitung</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  background: url("Moewe_head_focus.jpg") no-repeat center center;
  background-size: contain;
  background-color: #000;

  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.box {
  margin-right: 5%;
  background: rgba(255, 230, 120, 0.9);
  padding: 25px 35px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 300px;
}

h1 {
  font-size: 1.2rem;
  margin-bottom: 15px;
  color: #666;
}

#countdown {
  font-size: 2.5rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #666;
}

.progress {
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  width: 100%;
  background: #666;
  transition: width 1s linear;
}
</style>
</head>

<body>

<div class="box">
  <h1>Automatische Weiterleitung in:</h1>
  <div id="countdown">3</div>

  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>
</div>

<!-- GoatCounter (optional, stört nix mehr) -->
<script data-goatcounter="https://inselhendrik.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

<script>
let timeLeft = 3;

const el = document.getElementById("countdown");
const bar = document.getElementById("bar");

/* Sichere Tracking-Funktion */
function track(path) {
  if (window.goatcounter && typeof goatcounter.count === "function") {
    goatcounter.count({path: path});
  }
}

/* Countdown startet SOFORT (kein DOMContentLoaded nötig) */
const interval = setInterval(() => {
  timeLeft--;

  el.textContent = timeLeft;
  bar.style.width = (timeLeft / 3 * 100) + "%";

  if (timeLeft <= 0) {
    clearInterval(interval);
    track('auto-redirect');
    window.location.href = "https://www.bahnbubble.eu/u/Baureihe218";
  }
}, 1000);
</script>

</body>
</html>
