<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Weiterleitung</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: url("Moewe_2026_04_07.jpg") no-repeat center center/cover;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .box {
      margin-right: 5%;
      background: rgba(255, 230, 120, 0.9); /* blassgelb */
      padding: 25px 35px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 300px;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #666; /* hellgrau */
    }

    #countdown {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #666;
    }

    a {
      color: #666;
      text-decoration: none;
      font-size: 0.95rem;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Automatische Weiterleitung in:</h1>
  <div id="countdown">3</div>

  <a rel="me" href="https://zug.network/@Baureihe218">
    Zurück zu zug.network
  </a>
</div>

<script>
  let timeLeft = 3;
  const el = document.getElementById("countdown");

  const interval = setInterval(() => {
    timeLeft--;
    el.textContent = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(interval);
      window.location.href = "https://www.bahnbubble.eu/u/Baureihe218";
    }
  }, 1000);
</script>

</body>
</html>
