<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Weiterleitung</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  background: url("Moewe_head_focus.jpg") no-repeat center center;
  background-size: contain; /* GANZES Bild sichtbar */
  background-color: #000;

  display: flex;
  justify-content: flex-end;
  align-items: center;
  position: relative;
}

/* BOX */
.box {
  margin-right: 5%;
  background: rgba(255, 230, 120, 0.9);
  padding: 25px 35px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 300px;
}

h1 {
  font-size: 1.2rem;
  margin-bottom: 15px;
  color: #666;
}

#countdown {
  font-size: 2.5rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #666;
}

/* LADEBALKEN */
.progress {
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  width: 100%;
  background: #666;
  transition: width 1s linear;
}

/* LINK */
a {
  color: #666;
  text-decoration: none;
  font-size: 0.95rem;
}

a:hover {
  text-decoration: underline;
}

/* SPRECHBLASE */
.bubble {
  position: absolute;
  left: 10%;
  top: 20%;
  background: white;
  padding: 12px 18px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  font-size: 0.9rem;
  cursor: pointer;
  animation: float 2s ease-in-out infinite;
}

.bubble::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 30px;
  border-width: 10px;
  border-style: solid;
  border-color: white transparent transparent transparent;
}

/* kleine Animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<!-- SPRECHBLASE -->
<div class="bubble" onclick="playSound()">
  🐦 bwegt 🎵<br>
  <strong>Klicke hier</strong>
</div>

<div class="box">
  <h1>Automatische Weiterleitung zu meiner Streckenkarte in:</h1>
  <div id="countdown">3</div>

  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>

  <a rel="me" href="https://zug.network/@Baureihe218">
    Zurück zu zug.network
  </a>
</div>

<audio id="sound" src="bwegt.m4a"></audio>

<script>
let timeLeft = 3;
const el = document.getElementById("countdown");
const bar = document.getElementById("bar");

const interval = setInterval(() => {
  timeLeft--;
  el.textContent = timeLeft;

  bar.style.width = (timeLeft / 3 * 100) + "%";

  if (timeLeft <= 0) {
    clearInterval(interval);
    window.location.href = "https://www.bahnbubble.eu/u/Baureihe218";
  }
}, 1000);

/* SOUND */
function playSound() {
  const audio = document.getElementById("sound");
  audio.play();
}
</script>

</body>
</html>
